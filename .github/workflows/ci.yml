# CI/CD pipeline for kendo-translation
#
# Jobs:
#   typecheck      — tsc --noEmit on all pushes
#   lint           — eslint on all pushes (continue-on-error)
#   playwright-smoke — production smoke tests on push to main
#
# Secrets required:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#
# Deployment: handled automatically by Vercel GitHub integration (not in this file).
# User-flow tests (tests/user-flow-tests.spec.ts) are intentionally NOT in CI
# because they write real data and require human review of timing annotations.

name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    # ESLint config may have minor issues (e.g. missing eslint.config.mjs,
    # uninstalled plugin peer deps, or Next.js 16 compat edge cases).
    # We let lint run but don't block the pipeline on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint -- --max-warnings 0

  playwright-smoke:
    name: Playwright production smoke tests
    runs-on: ubuntu-latest
    # Only run on push to main — avoid expensive Camoufox + browser
    # install on every feature-branch push.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Smoke tests hit the production Vercel URL, not a local dev server.
      # Set TEST_BASE_URL so Playwright's webServer.url check passes instantly
      # against the live site (no need to wait for `npm run dev`).
      TEST_BASE_URL: https://kendo-translation.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx camoufox fetch
      - run: npx playwright install firefox
      - run: npx playwright test tests/production-smoke.spec.ts --reporter=github
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
